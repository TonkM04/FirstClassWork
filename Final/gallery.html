<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gallery — Learning to See</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap">
  <style>
    .page-hero {
      padding: 140px 60px 60px;
      text-align: center;
      transition: filter 0.3s;
    }
    .page-hero h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 64px;
      font-weight: 300;
      color: var(--text);
    }
    .page-hero h1 em { font-style: italic; color: var(--gold-warm); }

    /* Filter buttons */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 0 40px 40px;
      transition: filter 0.3s;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      padding: 10px 24px;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
    }
    .filter-btn:hover { color: var(--gold); border-color: var(--gold); }
    .filter-btn.active { background-color: var(--gold); color: var(--bg); border-color: var(--gold); }

    /* Gallery layout */
    .full-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 20px 40px 100px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .g-portrait { flex: 0 0 32%; }
    .g-portrait img { width: 100%; height: 500px; object-fit: cover; object-position: top; display: block; transition: transform 0.4s; }
    .g-landscape { flex: 0 0 65%; }
    .g-landscape img { width: 100%; height: 500px; object-fit: cover; object-position: center; display: block; transition: transform 0.4s; }
    .g-wide { flex: 0 0 100%; }
    .g-wide img { width: 100%; height: 460px; object-fit: cover; object-position: center; display: block; transition: transform 0.4s; }
    .gallery-item:hover img { transform: scale(1.03); }

    /* Hidden by filter — using class, not dataset */
    .gallery-item.hidden { display: none; }

    @media screen and (max-width: 768px) {
      .page-hero { padding: 110px 24px 50px; }
      .page-hero h1 { font-size: 44px; }
      .full-gallery { padding: 0 16px 80px; }
      .g-portrait, .g-landscape, .g-wide { flex: 0 0 100%; }
      .g-portrait img, .g-landscape img, .g-wide img { height: 280px; }
      .filter-bar { flex-wrap: wrap; padding: 0 20px 32px; }
    }
  </style>
</head>
<body>

  <!-- ISO noise overlays -->
  <div id="noise-overlay"></div>
  <canvas id="grain-canvas"></canvas>

  <div id="welcome-bar"></div>

  <!-- Navigation with camera controls -->
  <nav id="nav" class="scrolled">
    <a href="./index.html" class="logo">Learning to See</a>

    <div class="cam-controls-nav">
      <div class="cam-ctrl">
        <span class="cam-ctrl-label">Aperture</span>
        <div class="cam-ctrl-row">
          <input type="range" id="aperture-slider" min="1" max="10" value="6">
          <span class="cam-ctrl-value" id="aperture-value">f/8</span>
        </div>
      </div>
      <div class="cam-ctrl">
        <span class="cam-ctrl-label">Shutter</span>
        <div class="cam-ctrl-row">
          <input type="range" id="shutter-slider" min="1" max="10" value="4">
          <span class="cam-ctrl-value" id="shutter-value">1/125s</span>
        </div>
      </div>
      <div class="cam-ctrl">
        <span class="cam-ctrl-label">ISO</span>
        <div class="cam-ctrl-row">
          <input type="range" id="iso-slider" min="1" max="10" value="3">
          <span class="cam-ctrl-value" id="iso-value">400</span>
        </div>
      </div>
    </div>

    <ul>
      <li><a href="./index.html">Home</a></li>
      <li><a href="./gallery.html" class="current">Gallery</a></li>
      <li><a href="./index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <div id="content-wrap">
    <header class="page-hero">
      <p class="section-tag">All Photos</p>
      <hr class="gold-line">
      <h1>The <em>Archive</em></h1>
    </header>

    <!-- Filter buttons -->
    <div class="filter-bar">
      <button class="filter-btn active" id="btn-all">All</button>
      <button class="filter-btn" id="btn-portrait">Portrait</button>
      <button class="filter-btn" id="btn-street">Street</button>
    </div>

    <div style="background-color: var(--bg-2); padding-top: 10px;">
      <div class="full-gallery" id="full-gallery">

        <!-- Each figure has a class for its category -->
        <figure class="gallery-item g-wide street">
          <img src="./img/p11.jpg" alt="New York skyline at dusk" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p02.jpg" alt="Man on bench" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p12.jpg" alt="Guitarist in the rain" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p13.jpg" alt="Woman on ferry" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-landscape street">
          <img src="./img/p08.jpg" alt="Red ribbons" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait street">
          <img src="./img/p04.jpg" alt="Buddha statue" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p05.jpg" alt="Portrait" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p06.jpg" alt="Portrait by window" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p16.jpg" alt="Chess player" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-wide street">
          <img src="./img/p14.jpg" alt="Staten Island ferry" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait street">
          <img src="./img/p17.jpg" alt="Temple courtyard" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-landscape street">
          <img src="./img/p01.jpg" alt="Food" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p10.jpg" alt="Saxophone" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p15.jpg" alt="Drummer" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p03.jpg" alt="Kid on bench" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-landscape street">
          <img src="./img/p18.jpg" alt="Car in golden light" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait street">
          <img src="./img/p09.jpg" alt="Statue through circle" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait street">
          <img src="./img/p07.jpg" alt="Cat" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-landscape street">
          <img src="./img/p19.jpg" alt="Food close-up" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait street">
          <img src="./img/p20.jpg" alt="Lighthouse and sculptures" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait portrait">
          <img src="./img/p21.jpg" alt="People on stairs" onclick="showBig(this)">
        </figure>
        <figure class="gallery-item g-portrait street">
          <img src="./img/p22.jpg" alt="City skyline at night" onclick="showBig(this)">
        </figure>

      </div>
    </div>
  </div>

  <footer>
    <p class="footer-logo">Learning to See</p>
    <p class="footer-copy">&copy; Copyright 2026 Learning to See, all rights reserved.</p>
  </footer>

  <div id="overlay" onclick="hideBig()">
    <img id="big-img" src="" alt="">
    <p id="close-hint">click anywhere to close</p>
  </div>
  <button class="lb-arrow" id="lb-prev" onclick="prevImage()">&#8592;</button>
  <button class="lb-arrow" id="lb-next" onclick="nextImage()">&#8594;</button>

  <script>

    /* Camera controls and effects */

    var apertureLabels = ['f/1.4','f/2','f/2.8','f/4','f/5.6','f/8','f/11','f/16','f/22','f/32'];
    var shutterLabels  = ['1/1000s','1/500s','1/250s','1/125s','1/60s','1/30s','1/15s','1/8s','1/4s','1/2s'];
    var isoLabels      = ['100','200','400','800','1600','3200','6400','12800','25600','51200'];

    var currentTransitionDuration = 0.15;

    document.getElementById('aperture-slider').addEventListener('input', function() {
      var val = parseInt(this.value);
      document.getElementById('aperture-value').textContent = apertureLabels[val - 1];
      var blurMap = [10, 6, 3, 0, 0, 0, 0, 0, 0, 0];
      var blur = blurMap[val - 1];
      var filterStr = blur > 0 ? 'blur(' + blur + 'px)' : 'none';
      var textSections = document.querySelectorAll('.page-hero, .filter-bar, footer');
      for (var i = 0; i < textSections.length; i++) {
        textSections[i].style.filter = filterStr;
        textSections[i].style.transition = 'filter 0.3s ease';
      }
    });

    document.getElementById('shutter-slider').addEventListener('input', function() {
      var val = parseInt(this.value);
      document.getElementById('shutter-value').textContent = shutterLabels[val - 1];
      currentTransitionDuration = 0.05 + (val - 1) * 0.13;
    });

    var grainInterval = null;

    document.getElementById('iso-slider').addEventListener('input', function() {
      var val = parseInt(this.value);
      document.getElementById('iso-value').textContent = isoLabels[val - 1];
      var lightness = (val - 1) * 2.5;
      document.body.style.setProperty('--bg',      'hsl(30, 5%, ' + lightness + '%)');
      document.body.style.setProperty('--bg-2',    'hsl(30, 5%, ' + (lightness + 2) + '%)');
      document.body.style.setProperty('--bg-card', 'hsl(30, 5%, ' + (lightness + 4) + '%)');
      document.getElementById('nav').style.backgroundColor = 'hsl(30, 5%, ' + lightness + '%)';
      document.querySelector('.page-hero').style.filter = 'brightness(' + (0.3 + (val - 1) * 0.19) + ')';

      var canvas = document.getElementById('grain-canvas');
      var ctx    = canvas.getContext('2d');

      if (val >= 6) {
        canvas.style.opacity = (val - 5) * 0.12;
        if (grainInterval) { clearInterval(grainInterval); }
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        var dotCount = (val - 5) * 120;
        grainInterval = setInterval(function() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (var d = 0; d < dotCount; d++) {
            var x = Math.random() * canvas.width;
            var y = Math.random() * canvas.height;
            ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)';
            ctx.fillRect(x, y, 1, 1);
          }
        }, 60);
      } else {
        canvas.style.opacity = 0;
        if (grainInterval) {
          clearInterval(grainInterval);
          grainInterval = null;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
    });

    window.addEventListener('resize', function() {
      var c = document.getElementById('grain-canvas');
      c.width = window.innerWidth;
      c.height = window.innerHeight;
    });


    var savedName = localStorage.getItem('userName');
    if (savedName) {
      document.getElementById('welcome-bar').innerHTML =
        savedName + ', would you like me to take a portrait for you? &nbsp;→&nbsp;<a href="./index.html#contact" style="color:inherit;text-decoration:underline;letter-spacing:0.1em;">Get in touch</a>';
      document.getElementById('welcome-bar').classList.add('visible');
      document.body.classList.add('has-welcome-bar');
    }


    /* Category filter */

    var galleryItems = document.querySelectorAll('.gallery-item');
    var filterBtns   = document.querySelectorAll('.filter-btn');

    function setFilter(category) {
      /* Update active button */
      for (var b = 0; b < filterBtns.length; b++) {
        filterBtns[b].classList.remove('active');
      }
      document.getElementById('btn-' + category).classList.add('active');

      /* Show or hide each item based on its class */
      for (var i = 0; i < galleryItems.length; i++) {
        var item = galleryItems[i];
        if (category === 'all') {
          item.classList.remove('hidden');
        } else if (item.classList.contains(category)) {
          item.classList.remove('hidden');
        } else {
          item.classList.add('hidden');
        }
      }
      buildImageList();
    }

    document.getElementById('btn-all').addEventListener('click', function() { setFilter('all'); });
    document.getElementById('btn-portrait').addEventListener('click', function() { setFilter('portrait'); });
    document.getElementById('btn-street').addEventListener('click', function() { setFilter('street'); });


    /* Lightbox */

    var currentIndex   = 0;
    var lightboxImages = [];

    function buildImageList() {
      var allImgs = document.querySelectorAll('.gallery-item:not(.hidden) img');
      lightboxImages = [];
      for (var m = 0; m < allImgs.length; m++) {
        lightboxImages.push(allImgs[m]);
      }
    }
    buildImageList();

    function showBig(img) {
      for (var n = 0; n < lightboxImages.length; n++) {
        if (lightboxImages[n].src === img.src) { currentIndex = n; break; }
      }
      var bigImg = document.getElementById('big-img');
      bigImg.style.transition = 'opacity ' + currentTransitionDuration + 's ease';
      bigImg.style.opacity = 0;
      setTimeout(function() {
        bigImg.src = img.src;
        bigImg.alt = img.alt;
        bigImg.style.opacity = 1;
      }, currentTransitionDuration * 1000);
      document.getElementById('overlay').classList.add('current');
      document.getElementById('lb-prev').style.display = 'flex';
      document.getElementById('lb-next').style.display = 'flex';
    }

    function hideBig() {
      document.getElementById('overlay').classList.remove('current');
      document.getElementById('lb-prev').style.display = 'none';
      document.getElementById('lb-next').style.display = 'none';
    }

    function prevImage() {
      currentIndex = currentIndex - 1;
      if (currentIndex < 0) { currentIndex = lightboxImages.length - 1; }
      var bigImg = document.getElementById('big-img');
      bigImg.style.transition = 'opacity ' + currentTransitionDuration + 's ease';
      bigImg.style.opacity = 0;
      setTimeout(function() {
        bigImg.src = lightboxImages[currentIndex].src;
        bigImg.alt = lightboxImages[currentIndex].alt;
        bigImg.style.opacity = 1;
      }, currentTransitionDuration * 1000);
    }

    function nextImage() {
      currentIndex = currentIndex + 1;
      if (currentIndex >= lightboxImages.length) { currentIndex = 0; }
      var bigImg = document.getElementById('big-img');
      bigImg.style.transition = 'opacity ' + currentTransitionDuration + 's ease';
      bigImg.style.opacity = 0;
      setTimeout(function() {
        bigImg.src = lightboxImages[currentIndex].src;
        bigImg.alt = lightboxImages[currentIndex].alt;
        bigImg.style.opacity = 1;
      }, currentTransitionDuration * 1000);
    }

    document.getElementById('lb-prev').style.display = 'none';
    document.getElementById('lb-next').style.display = 'none';


    document.addEventListener('DOMContentLoaded', function() {
      var nav = document.getElementById('nav');
      window.addEventListener('scroll', function() {
        if (window.scrollY > 50) { nav.classList.add('scrolled'); }
        else { nav.classList.remove('scrolled'); }
      });
    });

  </script>

</body>
</html>
